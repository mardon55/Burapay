[phases.setup]
nixPkgs = ["python312", "nodejs_22", "nodePackages_latest.npm"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm install",
  "node scripts/create-ajv-shim.js"
]

[phases.build]
cmds = [
  "cd frontend && GENERATE_SOURCEMAP=false CI=false npm run build"
]

[start]
cmd = "bash railway_start.sh"
