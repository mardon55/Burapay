[phases.setup]
nixPkgs = ["python312", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd frontend && GENERATE_SOURCEMAP=false npm run build"
]

[start]
cmd = "bash railway_start.sh"
